name: now-playing

on:
  schedule:
    # every 30 minutes — GitHub may delay cron under load
    - cron: '*/30 * * * *'
  workflow_dispatch:

# only one run at a time so we don't push over ourselves
concurrency:
  group: now-playing
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # required for the trigger-deploy step. `gh workflow run` calls the
      # workflow_dispatch endpoint, which needs actions:write.
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: fetch + write now-playing.json
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: node scripts/update-now-playing.mjs

      - name: commit if changed
        id: commit
        run: |
          if [[ -n "$(git status --porcelain public/now-playing.json)" ]]; then
            git config user.name  'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add public/now-playing.json
            git commit -m 'now-playing: update'
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "no diff"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # GitHub's safety rule: commits made with the default GITHUB_TOKEN
      # don't trigger other workflows (no recursion). workflow_dispatch is
      # the documented exception — so we dispatch deploy.yml explicitly
      # whenever the now-playing data actually changed.
      - name: trigger deploy on change
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
